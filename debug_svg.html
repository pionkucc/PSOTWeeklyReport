<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SVG Debug</title>
<style>
body { font-family: monospace; padding: 20px; background: #f5f5f5; }
#info { white-space: pre-wrap; font-size: 12px; background: white; padding: 15px; border-radius: 8px; margin-top: 20px; max-height: 600px; overflow: auto; }
</style>
</head>
<body>
<h3>Plotly SVG Structure Debug</h3>
<button onclick="debugSVG()">Click to Debug</button>
<div id="info"></div>

<div id="chart" style="width:600px;height:400px;"></div>

<script>
// Load Plotly first, then create a simple chart and inspect
var script = document.createElement('script');
script.src = 'https://cdn.plot.ly/plotly-3.5.0.min.js';
script.onload = function() {
    // Create a simple bar chart
    Plotly.newPlot('chart', [
        {x: ['A','B','C'], y: [10,20,30], type: 'bar'},
        {x: ['D','E'], y: [15,25], type: 'bar'}
    ], {}, {displayModeBar: false});
};
document.head.appendChild(script);

function debugSVG() {
    var svg = document.querySelector('#chart svg.main-svg');
    var info = document.getElementById('info');
    var text = '';

    // List all g elements and their classes
    var gs = svg.querySelectorAll('g');
    gs.forEach(function(g, i) {
        var cls = g.getAttribute('class') || '(no class)';
        var children = g.children.length;
        text += 'g[' + i + '] class="' + cls + '" children=' + children + '\n';

        // Show first level children tag names
        var childTags = [];
        for (var j = 0; j < Math.min(children, 5); j++) {
            childTags.push(g.children[j].tagName + (g.children[j].getAttribute('class') ? '.' + g.children[j].getAttribute('class') : ''));
        }
        if (children > 5) childTags.push('...');
        text += '  children: ' + childTags.join(', ') + '\n';
    });

    // List all rect elements
    text += '\n=== All rect elements ===\n';
    var rects = svg.querySelectorAll('rect');
    rects.forEach(function(r, i) {
        text += 'rect[' + i + '] x=' + r.getAttribute('x') + ' y=' + r.getAttribute('y') +
                ' w=' + r.getAttribute('width') + ' h=' + r.getAttribute('height') +
                ' fill=' + r.getAttribute('fill') +
                ' parent=' + (r.parentElement.getAttribute('class') || r.parentElement.tagName) + '\n';
    });

    // List all path elements
    text += '\n=== All path elements ===\n';
    var paths = svg.querySelectorAll('path');
    paths.forEach(function(p, i) {
        var d = (p.getAttribute('d') || '').substring(0, 50);
        text += 'path[' + i + '] d="' + d + '..." parent=' + (p.parentElement.getAttribute('class') || p.parentElement.tagName) + '\n';
    });

    // List all circle elements
    text += '\n=== All circle elements ===\n';
    var circles = svg.querySelectorAll('circle');
    circles.forEach(function(c, i) {
        text += 'circle[' + i + '] cx=' + c.getAttribute('cx') + ' cy=' + c.getAttribute('cy') +
                ' r=' + c.getAttribute('r') + ' class=' + (c.getAttribute('class') || '(none)') + '\n';
    });

    info.textContent = text;
}
</script>
</body>
</html>
